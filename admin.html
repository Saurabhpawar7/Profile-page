<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Skills Admin · Saurabh Dev</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.css"><style>.admin-shell{max-width:900px;margin:auto;padding:60px 24px 110px}.admin-intro{margin-bottom:42px}.admin-intro h1{font-size:clamp(42px,7vw,70px)}.admin-intro p,.admin-card p{color:var(--muted);line-height:1.7}.admin-card{padding:28px;margin-top:20px;border:1px solid var(--line);border-radius:22px;background:var(--glass);backdrop-filter:blur(18px)}.admin-card h2{margin:0 0 8px;font-size:22px}.admin-head{display:flex;justify-content:space-between;gap:15px}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0 15px}label{display:block;font:500 10px 'DM Mono',monospace;letter-spacing:.08em;margin:17px 0;color:#d5d3e1}input,textarea,select{width:100%;display:block;margin-top:8px;padding:12px;border:1px solid #ffffff2b;border-radius:10px;background:#070914;color:var(--ink);font:14px Manrope}textarea{min-height:100px}button{border:0;border-radius:10px;padding:12px 16px;background:#a885ff;color:#100c1d;font-weight:700;cursor:pointer}.quiet,.delete{background:#ffffff12;color:#ecebff;border:1px solid #ffffff22}.delete{color:#ffaba2}.actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}.skill-row{display:flex;justify-content:space-between;align-items:center;gap:15px;padding:15px 0;border-top:1px solid #ffffff1b}.skill-row strong,.skill-row span{display:block}.skill-row span{margin-top:4px;color:var(--muted);font:9px 'DM Mono';letter-spacing:.08em}@media(max-width:600px){.admin-shell{padding:35px 18px}.admin-card{padding:20px}.form-grid{grid-template-columns:1fr}.skill-row{align-items:flex-start}}</style></head><body><div class="ambient ambient-one"></div><div class="grid"></div><header class="site-header"><a class="brand" href="index.html"><span class="brand-dot"></span>SAURABH<span class="brand-slash">/</span>DEV</a><a class="header-pill" href="index.html">View portfolio ↗</a></header><main class="admin-shell"><section class="admin-intro"><p class="eyebrow"><span></span>PRIVATE DASHBOARD</p><h1>Manage your <em>skills.</em></h1><p>Add a new skill here and it will appear on your live portfolio.</p></section><section id="login" class="admin-card"><h2>Sign in</h2><p>Use the email and password created in Firebase.</p><form id="loginForm"><label>Email<input id="email" type="email" required></label><label>Password<input id="password" type="password" required></label><button>Sign in</button></form></section><section id="dash" hidden><section class="admin-card"><div class="admin-head"><div><h2>Add a skill</h2><p id="note">Fill this in and publish it instantly.</p></div><button id="out" class="quiet">Sign out</button></div><form id="form"><input id="id" type="hidden"><div class="form-grid"><label>Name<input id="name" required maxlength="50"></label><label>Category<input id="category" required maxlength="40" placeholder="e.g. FRONTEND"></label><label>Icon<input id="icon" required maxlength="8" placeholder="e.g. ⚛"></label><label>Colour<select id="color"><option value="java">Coral</option><option value="spring">Green</option><option value="database">Blue</option><option value="web">Gold</option><option value="tools">Purple</option><option value="next">Pink</option></select></label></div><label>Description<textarea id="description" required maxlength="180"></textarea></label><div class="actions"><button type="button" id="cancel" class="quiet" hidden>Cancel edit</button><button id="save">Publish skill</button></div></form></section><section class="admin-card"><h2>Your published skills</h2><div id="list"></div></section></section></main><script type="module" src="admin.js"></script></body></html>
